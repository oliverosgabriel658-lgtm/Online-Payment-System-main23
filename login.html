<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PayThru Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(#eef2f7,#dce5f3);
}

.card{
width:380px;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
width:60px;
height:60px;
background:#2f6fed;
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
font-size:26px;
margin:0 auto 15px;
}

h1{
font-size:26px;
font-weight:600;
margin-bottom:6px;
}

.subtitle{
color:#6b7280;
font-size:14px;
margin-bottom:25px;
}

label{
display:block;
text-align:left;
margin-top:14px;
font-size:14px;
}

.input-group{
position:relative;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid #e5e7eb;
font-size:14px;
}

.toggle{
position:absolute;
right:10px;
top:16px;
cursor:pointer;
font-size:13px;
color:#2f6fed;
}

.login-btn{
margin-top:20px;
width:100%;
background:#2f6fed;
border:none;
padding:12px;
color:white;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.login-btn:hover{
background:#1e55d6;
}

.strength{
font-size:12px;
margin-top:4px;
text-align:left;
}

.error{
color:red;
}

.signup{
margin-top:18px;
font-size:14px;
color:#6b7280;
}

.signup a{
color:#2f6fed;
text-decoration:none;
font-weight:500;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">$</div>

<h1>PayThru</h1>
<p class="subtitle">Login to your account</p>

<form>

<label>Email Address</label>
<input type="email" required placeholder="Enter your email">

<label>MPIN</label>

<div class="input-group">
<input type="password" id="mpin" maxlength="6" placeholder="Enter your MPIN">
<span class="toggle" onclick="toggleMPIN()">Show</span>
</div>

<div id="mpinMsg" class="strength"></div>

<button class="login-btn">Login</button>

</form>

<div class="signup">
Don't have an account?
<a href="register.html">Sign up</a>
</div>

</div>

<script>

// MPIN VALIDATION
document.getElementById("mpin").addEventListener("input", function(){

this.value=this.value.replace(/\D/g,'')

let msg=document.getElementById("mpinMsg")

if(this.value.length<4){
msg.textContent="MPIN must be at least 4 digits"
msg.className="strength error"
}else{
msg.textContent=""
}

})

// SHOW/HIDE MPIN

function toggleMPIN(){

let mpin=document.getElementById("mpin")

if(mpin.type==="password"){
mpin.type="text"
}else{
mpin.type="password"
}

}

</script>

</body>
</html>
