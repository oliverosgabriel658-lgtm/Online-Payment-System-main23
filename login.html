<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayThru Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }

        .card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #d1d1d1;
            text-align: center;
            /* Center the card on the screen */
            margin: auto; 
        }

        .logo {
            width: 58px;
            height: 58px;
            background: #0047FF; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 32px;
            margin: 0 auto 12px;
        }

        h1 {
            font-size: 30px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .input-wrapper {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: #888;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border-radius: 10px;
            border: 1px solid #666;
            font-size: 16px;
            outline: none;
        }

        .toggle {
            position: absolute;
            right: 15px;
            cursor: pointer;
            font-size: 14px;
            color: #0047FF;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Vertically centers the checkbox row and Forgot Password link */
            margin-top: 15px;
            font-size: 14px;
        }

        .remember {
            display: flex;
            align-items: center; /* Perfectly centers the checkbox with the text */
            gap: 8px; /* Adds a clean gap so they don't touch */
            cursor: pointer;
            color: #000;
        }

        .remember input {
            width: 16px;
            height: 16px;
            margin: 0; /* Removes default browser margins that cause misalignment */
            cursor: pointer;
            accent-color: #0047FF; /* Matches your PayThru blue */
        }

        .forgot {
            color: #0047FF;
            text-decoration: none;
        }

        .login-btn {
            margin-top: 30px;
            width: 100%;
            background: #0047FF;
            border: none;
            padding: 16px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 500;
        }

        .signup-text {
            margin-top: 25px;
            font-size: 15px;
        }

        .signup-text a {
            color: #0047FF;
            text-decoration: none;
        }

        /* Footer positioned at the bottom of the viewport */
        footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">₱</div>
        <h1>PayThru</h1>
        <p class="subtitle">Login to your account</p>

        <form>
            <div class="input-wrapper">
                <label>Email Address</label>
                <div class="input-group">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </span>
                    <input type="email" required placeholder="Enter your email">
                </div>
            </div>

            <div class="input-wrapper">
                <label>MPIN</label>
                <div class="input-group">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" id="mpin" maxlength="6" placeholder="Enter your MPIN">
                    <span class="toggle" onclick="toggleMPIN()">Show</span>
                </div>
            </div>

            <div class="options-row">
                <label class="remember">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot">Forget Password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="signup-text">
        Don't have an account? <a href="register.html">Sign up</a>
        </div>
    </div>

    <footer>
        Secure payment processing with bank-level encryption
    </footer>

    <script>
        document.getElementById("mpin").addEventListener("input", function() {
            this.value = this.value.replace(/\D/g, '');
        });

        function toggleMPIN() {
            const mpin = document.getElementById("mpin");
            const btn = document.querySelector(".toggle");
            if (mpin.type === "password") {
                mpin.type = "text";
                btn.textContent = "Hide";
            } else {
                mpin.type = "password";
                btn.textContent = "Show";
            }
        }
    </script>
</body>
</html>
