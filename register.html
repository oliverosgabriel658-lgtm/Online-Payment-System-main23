<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayThru Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
    }

    .card {
        width: 420px;
        background: white;
        padding: 40px;
        border-radius: 25px;
        border: 1px solid #d1d1d1;
        text-align: center;
        margin: auto;
    }

    .logo {
        width: 58px;
        height: 58px;
        background: #0047FF; 
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-size: 32px;
        margin: 0 auto 12px;
    }

    h1 {
        font-size: 30px;
        font-weight: 500;
        margin-bottom: 4px;
    }

    .subtitle {
        color: #666;
        font-size: 15px;
        margin-bottom: 25px;
    }

    .input-wrapper {
        text-align: left;
        margin-bottom: 14px;
    }

    label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 6px;
    }

    .input-group {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-icon {
        position: absolute;
        left: 14px;
        color: #888;
        display: flex;
        align-items: center;
    }

    input {
        width: 100%;
        padding: 12px 12px 12px 45px;
        border-radius: 10px;
        border: 1px solid #666;
        font-size: 15px;
        outline: none;
    }

    .toggle {
        position: absolute;
        right: 15px;
        cursor: pointer;
        font-size: 14px;
        color: #0047FF;
        font-weight: 500;
    }

    .strength {
        font-size: 11px;
        margin-top: 4px;
        text-align: left;
    }

    .error { color: #ff0000; }
    .success { color: #00a000; }

    .register-btn {
        margin-top: 25px;
        width: 100%;
        background: #0047FF;
        border: none;
        padding: 16px;
        color: white;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        font-weight: 500;
    }

    .login-link {
        margin-top: 20px;
        font-size: 14px;
    }

    .login-link a {
        color: #0047FF;
        text-decoration: none;
        font-weight: 500;
    }

    footer {
        width: 100%;
        text-align: center;
        padding: 20px 0;
        font-size: 13px;
        color: #888;
    }
</style>
</head>

<body>

<div class="card">
    <div class="logo">₱</div>
    <h1>Create Account</h1>
    <p class="subtitle">Register your PayThru wallet</p>

    <form id="registerForm">
        <div class="input-wrapper">
            <label>Full Name</label>
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <input type="text" required placeholder="Enter your full name">
            </div>
        </div>

        <div class="input-wrapper">
            <label>Email Address</label>
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </span>
                <input type="email" id="email" required placeholder="Enter your email address">
            </div>
            <div id="emailMsg" class="strength"></div>
        </div>

        <div class="input-wrapper">
            <label>Phone Number</label>
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </span>
                <input type="text" id="phone" required maxlength="11" placeholder="09XXXXXXXXX">
            </div>
            <div id="phoneMsg" class="strength"></div>
        </div>

        <div class="input-wrapper">
            <label>MPIN</label>
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" id="mpin" maxlength="6" required placeholder="Enter 4-6 digit MPIN">
                <span class="toggle" onclick="toggleMPIN()">Show</span>
            </div>
            <div id="mpinStrength" class="strength"></div>
        </div>

        <div class="input-wrapper">
            <label>Confirm MPIN</label>
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" id="confirmMpin" maxlength="6" required placeholder="Confirm MPIN">
            </div>
            <div id="confirmMsg" class="strength"></div>
        </div>

        <button type="submit" class="register-btn">Register</button>
    </form>

    <div class="login-link">
    Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<footer>
    Secure payment processing with bank-level encryption
</footer>

<script>
    // Keeping your original validation logic
    document.getElementById("email").addEventListener("input", function(){
        let email=this.value;
        let msg=document.getElementById("emailMsg");
        if(email.includes("@") && email.includes(".")){
            msg.textContent="Valid email";
            msg.className="strength success";
        }else{
            msg.textContent="Invalid email format";
            msg.className="strength error";
        }
    });

    document.getElementById("phone").addEventListener("input", function(){
        this.value=this.value.replace(/\D/g,'');
        let msg=document.getElementById("phoneMsg");
        if(this.value.length==11){
            msg.textContent="Valid phone number";
            msg.className="strength success";
        }else{
            msg.textContent="Phone must be 11 digits";
            msg.className="strength error";
        }
    });

    document.getElementById("mpin").addEventListener("input", function(){
        this.value=this.value.replace(/\D/g,'');
        let strength=document.getElementById("mpinStrength");
        if(this.value.length < 4){
            strength.textContent="MPIN too short";
            strength.className="strength error";
        } else {
            strength.textContent="Strong MPIN";
            strength.className="strength success";
        }
    });

    document.getElementById("confirmMpin").addEventListener("input", function(){
        let mpin=document.getElementById("mpin").value;
        let confirm=this.value;
        let msg=document.getElementById("confirmMsg");
        if(mpin===confirm && confirm !== ""){
            msg.textContent="MPIN matched";
            msg.className="strength success";
        }else{
            msg.textContent="MPIN does not match";
            msg.className="strength error";
        }
    });

    function toggleMPIN(){
        let mpin=document.getElementById("mpin");
        let toggle = document.querySelector(".toggle");
        if(mpin.type==="password"){
            mpin.type="text";
            toggle.textContent = "Hide";
        }else{
            mpin.type="password";
            toggle.textContent = "Show";
        }
    }
</script>
</body>
</html>
